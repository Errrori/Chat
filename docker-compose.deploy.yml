# 前端部署用 compose —— 不含 build，直接使用 chat:latest 镜像
# 使用方式：
#   1. docker load -i chat.tar
#   2. docker compose -f docker-compose.deploy.yml up -d
name: chatserver

services:
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Shanghai

  chat:
    image: chat:latest
    container_name: chat-server
    ports:
      - "10086:10086"
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./config.json:/app/config.json:ro
      - ./jwt_secret.json:/app/jwt_secret.json:ro
      - ./uploads:/app/uploads
      - ./database.db:/app/database.db
    depends_on:
      - redis
    working_dir: /app

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat
    environment:
      TZ: Asia/Shanghai

volumes:
  redis_data:
