server {
    listen 80;
    server_name localhost; 

    location / {
        # 2. 反向代理到后端的 Docker 服务
        proxy_pass http://chat:10086;
        
        proxy_http_version 1.1;

        # 把后端自己返回的 CORS 头屏蔽掉，避免和 Nginx 的冲突
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # 基础 Header 传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; 

        # 3. WebSocket 支持：仅非 OPTIONS 请求生效（避免预检请求干扰）
        if ($request_method != 'OPTIONS') {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ================= 本地开发 CORS 配置 =================
        # 所有 CORS 头都加 always，确保任何响应码都生效
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Upgrade, Connection' always;

        # 4. 拦截 OPTIONS 预检请求：关键修复 → 所有 add_header 加 always
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Upgrade, Connection' always;
            return 204;
        }
    }
}