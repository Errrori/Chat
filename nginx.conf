server {
    listen 80;
    server_name localhost; 


    location / {
        # 2. 反向代理到后端的 Docker 服务
        proxy_pass http://chat:10086;
        
        proxy_http_version 1.1;
        
        # 基础 Header 传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 告诉后端虽然经过代理，但原始协议是 http (配合 secure: false)
        proxy_set_header X-Forwarded-Proto $scheme; 


        # 3. WebSocket 支持 (必须保留，否则聊天功能会断)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";


        # ================= 🔵 本地开发 CORS 配置 =================
        
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        
        # 【重点】允许携带 Cookie (即使 secure: false 也需要这个头来允许跨域传 Cookie)
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # 允许的方法
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        
        # 允许的头 (包含 Authorization 和 WebSocket 需要的 Upgrade)
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Upgrade, Connection' always;


        # 4. 拦截 OPTIONS 预检请求 (浏览器发正式请求前会先发这个)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Upgrade, Connection';
            return 204;
        }
    }
}
