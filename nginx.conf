server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://chat:10086;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ================= 精简版 CORS 配置 =================
        
        # 1. 允许所有来源
        add_header 'Access-Control-Allow-Origin' '*' always;
        
        # 2. 允许的方法 (保留核心的 POST, OPTIONS 等)
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        
        # 3. 允许的头 (只保留最核心的：Content-Type 和 Authorization)
        # 注意：必须包含 Authorization，否则带 Token 的文件上传会失败
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        # 4. 拦截 OPTIONS 预检请求 (必须保留，防止后端处理不了)
        if ($request_method = 'OPTIONS') {
            # 在 if 块内需要重新声明 header，因为外部 header 在 if 块内不生效
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
            return 204;
        }
    }
}